name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ubuntu-latest already has Android SDK pre-installed — no extra setup needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Add Android platform
        run: ./node_modules/.bin/cap add android

      - name: Sync web build into Android project
        run: ./node_modules/.bin/cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
