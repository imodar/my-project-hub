name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          $SDKMANAGER "platforms;android-35" "build-tools;35.0.0" "platform-tools" 2>/dev/null || true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.ref_name }}-${{ github.sha }}

      - name: Add Android platform
        run: ./node_modules/.bin/cap add android

      - name: Fix RevenueCat Kotlin target compatibility
        run: |
          python3 - <<'PY'
          from pathlib import Path

          rc_gradle = Path("node_modules/@revenuecat/purchases-capacitor/android/build.gradle")
          if not rc_gradle.exists():
              print("RevenueCat gradle not found, skipping")
              raise SystemExit(0)

          text = rc_gradle.read_text()
          old = (
              "    compileOptions {\n"
              "        sourceCompatibility JavaVersion.VERSION_17\n"
              "        targetCompatibility JavaVersion.VERSION_17\n"
              "    }\n"
              "}")
          new = (
              "    compileOptions {\n"
              "        sourceCompatibility JavaVersion.VERSION_17\n"
              "        targetCompatibility JavaVersion.VERSION_17\n"
              "    }\n"
              "    kotlinOptions {\n"
              "        jvmTarget = '17'\n"
              "    }\n"
              "}")

          if old not in text:
              print("Warning: RevenueCat pattern not found, skipping (may already be patched)")
          else:
              rc_gradle.write_text(text.replace(old, new, 1))
              print("RevenueCat Kotlin fix applied")
          PY

      - name: Sync web build into Android project
        run: ./node_modules/.bin/cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
