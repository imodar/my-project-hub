name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ubuntu-latest already has Android SDK pre-installed — no extra setup needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Add Android platform
        run: ./node_modules/.bin/cap add android

      - name: Fix RevenueCat Kotlin target compatibility
        run: |
          python3 - <<'PY'
          from pathlib import Path
          rc_gradle = Path("node_modules/@revenuecat/purchases-capacitor/android/build.gradle")
          text = rc_gradle.read_text()
          old = "    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }\n}"
          new = "    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }\n    kotlinOptions {\n        jvmTarget = '17'\n    }\n}"
          if old not in text:
              raise SystemExit("Expected RevenueCat Android compileOptions block not found")
          rc_gradle.write_text(text.replace(old, new, 1))
          PY

      - name: Sync web build into Android project
        run: ./node_modules/.bin/cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
